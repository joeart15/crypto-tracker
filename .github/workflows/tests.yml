name: API Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest requests

      - name: Start crypto tracker server
        run: |
          nohup python3 server.py &
          sleep 3
          curl --retry 5 --retry-delay 1 --retry-connrefused http://localhost:3000 -o /dev/null -s

      - name: Run API tests
        run: pytest tests/test_api.py -v --tb=short
